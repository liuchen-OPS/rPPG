<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实rPPG心率检测（修复版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0d1123 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .camera-container {
            position: relative;
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            background: #f0f0f0;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .camera-placeholder {
            color: #999;
            font-size: 16px;
        }
        
        .face-overlay {
            position: absolute;
            border: 2px solid #27ae60;
            border-radius: 10px;
            background: rgba(39, 174, 96, 0.1);
            pointer-events: none;
        }
        
        .status-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .heart-rate {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
        
        .status {
            font-size: 16px;
            color: #7f8c8d;
            margin: 5px 0;
        }
        
        .quality {
            font-size: 14px;
            color: #27ae60;
            margin: 5px 0;
        }
        
        .signal-graph {
            height: 60px;
            background: #f0f0f0;
            border-radius: 5px;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }
        
        .signal-wave {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #27ae60, #e74c3c);
            opacity: 0.7;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-start {
            background: #27ae60;
            color: white;
        }
        
        .btn-stop {
            background: #e74c3c;
            color: white;
        }
        
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        
        .instructions {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }
        
        .instructions h3 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .instructions ul {
            padding-left: 20px;
            color: #856404;
        }
        
        .instructions li {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #7f8c8d;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .warning {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .debug-info {
            background: #e8f4fd;
            border: 1px solid #b3d9ff;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            font-size: 12px;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>❤️ 真实rPPG心率检测</h1>
            <p>基于真实算法的非接触式心率监测（修复版）</p>
        </div>
        
        <div class="camera-container">
            <video class="camera-feed" id="cameraFeed" autoplay playsinline></video>
            <div class="face-overlay" id="faceOverlay" style="display: none;"></div>
            <div class="camera-placeholder" id="cameraPlaceholder">
                点击"开始检测"启用摄像头
            </div>
        </div>
        
        <div class="warning" id="warningMessage">
            ⚠️ 真实算法版本 - 需要充足光照和稳定姿势
        </div>
        
        <div class="status-panel">
            <div class="status" id="statusText">状态: 等待开始检测</div>
            <div class="heart-rate" id="heartRate">--</div>
            <div class="quality" id="qualityText">信号质量: --%</div>
            <div class="status" id="stabilityText">稳定性: 0/10</div>
            <div class="signal-graph">
                <canvas id="signalCanvas" width="300" height="60"></canvas>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-start" id="startBtn">🔴 开始检测</button>
            <button class="btn btn-stop" id="stopBtn" disabled>停止检测</button>
        </div>
        
        <div class="debug-info" id="debugInfo">
            调试信息将显示在这里...
        </div>
        
        <div class="instructions">
            <h3>📝 使用说明（修复版）</h3>
            <ul>
                <li><strong>充足光照</strong>: 确保面部光线均匀明亮</li>
                <li><strong>正对摄像头</strong>: 面部完全在画面中央</li>
                <li><strong>保持稳定</strong>: 避免说话和头部移动</li>
                <li><strong>检测时间</strong>: 至少15秒获得稳定结果</li>
                <li><strong>信号质量</strong>: >60%表示检测可靠</li>
                <li><strong>修复内容</strong>: 解决摄像头就绪检查问题</li>
            </ul>
        </div>
        
        <div class="footer">
            <p>基于真实rPPG算法 | Web技术实现 | 无需安装</p>
        </div>
    </div>

    <script>
        // 真实rPPG算法实现
        class RealHeartRateDetector {
            constructor() {
                this.greenSignalBuffer = [];
                this.bufferSize = 180; // 6秒数据(30fps)
                this.samplingRate = 30;
                this.faceDetectionCount = 0;
                this.lastFacePosition = null;
            }
            
            // 检查视频是否就绪
            isVideoReady(videoElement) {
                return videoElement.videoWidth > 0 && videoElement.videoHeight > 0;
            }
            
            // 简化的人脸检测（基于肤色和运动）
            detectFaceRegion(videoElement) {
                // 检查视频是否就绪
                if (!this.isVideoReady(videoElement)) {
                    return null;
                }
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                
                try {
                    ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // 肤色检测算法
                    const skinPixels = this.detectSkinPixels(imageData);
                    
                    if (skinPixels.length > 100) { // 足够多的肤色像素
                        const faceRegion = this.calculateFaceRegion(skinPixels);
                        this.faceDetectionCount++;
                        return faceRegion;
                    }
                } catch (error) {
                    console.error('图像处理错误:', error);
                    return null;
                }
                
                return null;
            }
            
            // 肤色像素检测
            detectSkinPixels(imageData) {
                const skinPixels = [];
                const data = imageData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    // 简化肤色检测规则
                    if (r > 95 && g > 40 && b > 20 && 
                        Math.max(r, g, b) - Math.min(r, g, b) > 15 &&
                        Math.abs(r - g) > 15 && r > g && r > b) {
                        const x = (i / 4) % imageData.width;
                        const y = Math.floor((i / 4) / imageData.width);
                        skinPixels.push({x, y});
                    }
                }
                
                return skinPixels;
            }
            
            // 计算面部区域
            calculateFaceRegion(skinPixels) {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                
                skinPixels.forEach(pixel => {
                    minX = Math.min(minX, pixel.x);
                    minY = Math.min(minY, pixel.y);
                    maxX = Math.max(maxX, pixel.x);
                    maxY = Math.max(maxY, pixel.y);
                });
                
                const width = maxX - minX;
                const height = maxY - minY;
                
                // 验证区域合理性
                if (width > 50 && height > 50 && width < 300 && height < 300) {
                    return {
                        x: minX,
                        y: minY,
                        width: width,
                        height: height
                    };
                }
                
                return null;
            }
            
            // 提取绿色通道信号（rPPG核心）
            extractGreenSignal(videoElement, faceRegion) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 提取面部区域的绿色通道
                ctx.drawImage(videoElement, 
                    faceRegion.x, faceRegion.y, faceRegion.width, faceRegion.height,
                    0, 0, faceRegion.width, faceRegion.height);
                
                const imageData = ctx.getImageData(0, 0, faceRegion.width, faceRegion.height);
                const data = imageData.data;
                
                let totalGreen = 0;
                let pixelCount = 0;
                
                // 计算绿色通道平均值
                for (let i = 1; i < data.length; i += 4) { // 跳过第一个像素避免异常值
                    totalGreen += data[i]; // 绿色通道
                    pixelCount++;
                }
                
                return pixelCount > 0 ? totalGreen / pixelCount : 0;
            }
            
            // 信号预处理
            preprocessSignal(signalData) {
                if (signalData.length < 30) return signalData;
                
                // 去趋势（去除基线漂移）
                const detrended = this.detrend(signalData);
                
                // 带通滤波（0.8-4Hz，对应48-240bpm）
                const filtered = this.bandpassFilter(detrended, 0.8, 4, this.samplingRate);
                
                // 归一化
                return this.normalize(filtered);
            }
            
            // 去趋势处理
            detrend(signal) {
                const n = signal.length;
                const x = Array.from({length: n}, (_, i) => i);
                
                // 线性回归去趋势
                const sumX = x.reduce((a, b) => a + b, 0);
                const sumY = signal.reduce((a, b) => a + b, 0);
                const sumXY = x.reduce((sum, xi, i) => sum + xi * signal[i], 0);
                const sumXX = x.reduce((sum, xi) => sum + xi * xi, 0);
                
                const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
                const intercept = (sumY - slope * sumX) / n;
                
                return signal.map((y, i) => y - (slope * i + intercept));
            }
            
            // 带通滤波
            bandpassFilter(signal, lowFreq, highFreq, samplingRate) {
                // 简化版移动平均滤波
                const windowSize = Math.floor(samplingRate / (lowFreq + highFreq) * 0.5);
                return this.movingAverage(signal, windowSize);
            }
            
            // 移动平均滤波
            movingAverage(signal, windowSize) {
                const result = [];
                for (let i = 0; i < signal.length; i++) {
                    const start = Math.max(0, i - windowSize);
                    const end = Math.min(signal.length, i + windowSize);
                    const window = signal.slice(start, end);
                    result.push(window.reduce((a, b) => a + b, 0) / window.length);
                }
                return result;
            }
            
            // 信号归一化
            normalize(signal) {
                const mean = signal.reduce((a, b) => a + b, 0) / signal.length;
                const std = Math.sqrt(signal.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / signal.length);
                
                if (std === 0) return signal;
                return signal.map(val => (val - mean) / std);
            }
            
            // FFT心率计算
            calculateHeartRate(signal) {
                if (signal.length < 60) return { heartRate: 0, confidence: 0 }; // 需要至少2秒数据
                
                // 应用汉宁窗减少频谱泄漏
                const windowed = this.applyHanningWindow(signal);
                
                // 零填充提高频率分辨率
                const nfft = Math.max(256, windowed.length);
                const fftResult = this.simpleFFT(windowed, nfft);
                
                // 分析心率频段（0.8-2.5Hz，对应48-150bpm）
                return this.analyzeHeartRateFrequency(fftResult, nfft, this.samplingRate);
            }
            
            // 应用汉宁窗
            applyHanningWindow(signal) {
                const n = signal.length;
                return signal.map((val, i) => {
                    const window = 0.5 * (1 - Math.cos(2 * Math.PI * i / (n - 1)));
                    return val * window;
                });
            }
            
            // 简化版FFT（实际应用中应使用更高效的实现）
            simpleFFT(signal, nfft) {
                const real = [...signal, ...Array(nfft - signal.length).fill(0)];
                const imag = Array(nfft).fill(0);
                
                // 简化DFT实现（实际应用应使用FFT算法）
                const magnitude = [];
                for (let k = 0; k < nfft / 2; k++) {
                    let realSum = 0;
                    let imagSum = 0;
                    
                    for (let n = 0; n < nfft; n++) {
                        const angle = 2 * Math.PI * k * n / nfft;
                        realSum += real[n] * Math.cos(angle);
                        imagSum += real[n] * Math.sin(angle);
                    }
                    
                    magnitude.push(Math.sqrt(realSum * realSum + imagSum * imagSum));
                }
                
                return magnitude;
            }
            
            // 分析心率频率
            analyzeHeartRateFrequency(fftMagnitude, nfft, samplingRate) {
                const frequencies = [];
                for (let i = 0; i < fftMagnitude.length; i++) {
                    frequencies.push(i * samplingRate / nfft);
                }
                
                // 心率频率范围（0.8-2.5Hz）
                const hrStart = Math.floor(0.8 * nfft / samplingRate);
                const hrEnd = Math.floor(2.5 * nfft / samplingRate);
                
                let maxPower = 0;
                let peakFrequency = 0;
                
                for (let i = hrStart; i <= hrEnd && i < fftMagnitude.length; i++) {
                    if (fftMagnitude[i] > maxPower) {
                        maxPower = fftMagnitude[i];
                        peakFrequency = frequencies[i];
                    }
                }
                
                const heartRate = peakFrequency * 60; // 转换为bpm
                const confidence = Math.min(100, (maxPower / Math.max(...fftMagnitude)) * 100);
                
                // 验证心率合理性
                if (heartRate >= 40 && heartRate <= 180 && confidence > 20) {
                    return { heartRate: Math.round(heartRate), confidence: Math.round(confidence) };
                }
                
                return { heartRate: 0, confidence: 0 };
            }
            
            // 信号质量评估
            assessSignalQuality(signal) {
                if (signal.length < 30) return 0;
                
                // 基于信号标准差和周期性
                const std = this.calculateStandardDeviation(signal);
                const periodicity = this.assessPeriodicity(signal);
                
                return Math.min(100, std * 20 + periodicity * 80);
            }
            
            calculateStandardDeviation(signal) {
                const mean = signal.reduce((a, b) => a + b, 0) / signal.length;
                const variance = signal.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / signal.length;
                return Math.sqrt(variance);
            }
            
            assessPeriodicity(signal) {
                // 简化周期性评估（自相关函数峰值）
                const autocorr = [];
                const maxLag = Math.min(20, signal.length - 1);
                
                for (let lag = 0; lag <= maxLag; lag++) {
                    let sum = 0;
                    for (let i = 0; i < signal.length - lag; i++) {
                        sum += signal[i] * signal[i + lag];
                    }
                    autocorr.push(sum / (signal.length - lag));
                }
                
                // 寻找第二个峰值（第一个是自相关峰值）
                if (autocorr.length > 10) {
                    const secondPeak = Math.max(...autocorr.slice(5, 10));
                    const firstPeak = autocorr[0];
                    return firstPeak > 0 ? secondPeak / firstPeak : 0;
                }
                
                return 0;
            }
        }

        // 应用主逻辑
        const detector = new RealHeartRateDetector();
        let cameraStream = null;
        let detectionActive = false;
        let animationFrameId = null;
        let videoReady = false;
        
        // 获取DOM元素
        const cameraFeed = document.getElementById('cameraFeed');
        const cameraPlaceholder = document.getElementById('cameraPlaceholder');
        const faceOverlay = document.getElementById('faceOverlay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const heartRate = document.getElementById('heartRate');
        const qualityText = document.getElementById('qualityText');
        const stabilityText = document.getElementById('stabilityText');
        const debugInfo = document.getElementById('debugInfo');
        const signalCanvas = document.getElementById('signalCanvas');
        const ctx = signalCanvas.getContext('2d');
        
        // 视频流就绪检查
        function checkVideoReady() {
            if (cameraFeed.videoWidth > 0 && cameraFeed.videoHeight > 0) {
                videoReady = true;
                debugInfo.textContent = '摄像头已就绪，开始检测...';
                return true;
            }
            return false;
        }
        
        // 启动检测
        async function startDetection() {
            try {
                debugInfo.textContent = '正在请求摄像头权限...';
                
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                cameraFeed.srcObject = cameraStream;
                cameraPlaceholder.style.display = 'none';
                cameraFeed.style.display = 'block';
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusText.textContent = '状态: 摄像头初始化中...';
                statusText.style.color = '#f39c12';
                
                // 等待视频流就绪
                const waitForVideoReady = () => {
                    if (checkVideoReady()) {
                        detectionActive = true;
                        detector.faceDetectionCount = 0;
                        detector.greenSignalBuffer = [];
                        statusText.textContent = '状态: 检测中...';
                        statusText.style.color = '#27ae60';
                        processVideoFrame();
                    } else {
                        setTimeout(waitForVideoReady, 100);
                    }
                };
                
                waitForVideoReady();
                
            } catch (error) {
                debugInfo.textContent = `摄像头错误: ${error.message}`;
                statusText.textContent = '错误: 无法访问摄像头';
                statusText.style.color = '#e74c3c';
                startBtn.disabled = false;
            }
        }
        
        // 处理视频帧
        function processVideoFrame() {
            if (!detectionActive || !videoReady) return;
            
            try {
                const faceRegion = detector.detectFaceRegion(cameraFeed);
                
                if (faceRegion) {
                    // 显示面部区域
                    faceOverlay.style.display = 'block';
                    faceOverlay.style.left = `${faceRegion.x}px`;
                    faceOverlay.style.top = `${faceRegion.y}px`;
                    faceOverlay.style.width = `${faceRegion.width}px`;
                    faceOverlay.style.height = `${faceRegion.height}px`;
                    
                    // 提取绿色通道信号
                    const greenValue = detector.extractGreenSignal(cameraFeed, faceRegion);
                    detector.greenSignalBuffer.push(greenValue);
                    
                    // 保持缓冲区大小
                    if (detector.greenSignalBuffer.length > detector.bufferSize) {
                        detector.greenSignalBuffer.shift();
                    }
                    
                    // 每30帧（约1秒）进行一次心率计算
                    if (detector.faceDetectionCount % 30 === 0 && detector.greenSignalBuffer.length >= 60) {
                        const processedSignal = detector.preprocessSignal(detector.greenSignalBuffer);
                        const result = detector.calculateHeartRate(processedSignal);
                        const quality = detector.assessSignalQuality(processedSignal);
                        
                        updateDisplay(result.heartRate, quality, result.confidence);
                        drawSignalWave(processedSignal);
                        
                        debugInfo.textContent = `信号长度: ${detector.greenSignalBuffer.length} | 面部检测: ${detector.faceDetectionCount} | 质量: ${Math.round(quality)}%`;
                    }
                    
                    stabilityText.textContent = `稳定性: ${Math.min(10, Math.floor(detector.faceDetectionCount / 10))}/10`;
                } else {
                    faceOverlay.style.display = 'none';
                    debugInfo.textContent = '未检测到面部，请调整位置和光照';
                }
            } catch (error) {
                console.error('视频帧处理错误:', error);
                debugInfo.textContent = `处理错误: ${error.message}`;
            }
            
            if (detectionActive) {
                animationFrameId = requestAnimationFrame(processVideoFrame);
            }
        }
        
        // 停止检测
        function stopDetection() {
            detectionActive = false;
            videoReady = false;
            
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            cameraFeed.style.display = 'none';
            cameraPlaceholder.style.display = 'block';
            faceOverlay.style.display = 'none';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            statusText.textContent = '状态: 检测已停止';
            statusText.style.color = '#7f8c8d';
            heartRate.textContent = '--';
            heartRate.classList.remove('pulse');
            qualityText.textContent = '信号质量: --%';
            stabilityText.textContent = '稳定性: 0/10';
            
            ctx.clearRect(0, 0, signalCanvas.width, signalCanvas.height);
        }
        
        // 更新显示
        function updateDisplay(hr, quality, confidence) {
            if (hr > 0) {
                heartRate.textContent = hr;
                qualityText.textContent = `信号质量: ${Math.round(quality)}% (置信度: ${confidence}%)`;
                
                heartRate.classList.add('pulse');
                setTimeout(() => heartRate.classList.remove('pulse'), 500);
                
                if (hr >= 60 && hr <= 100) {
                    heartRate.style.color = '#27ae60';
                    statusText.textContent = '状态: 心率正常';
                } else if (hr < 60) {
                    heartRate.style.color = '#3498db';
                    statusText.textContent = '状态: 心率偏低';
                } else {
                    heartRate.style.color = '#e74c3c';
                    statusText.textContent = '状态: 心率偏高';
                }
                
                if (quality > 70) {
                    qualityText.style.color = '#27ae60';
                } else if (quality > 40) {
                    qualityText.style.color = '#f39c12';
                } else {
                    qualityText.style.color = '#e74c3c';
                }
            }
        }
        
        // 绘制信号波形
        function drawSignalWave(signal) {
            ctx.clearRect(0, 0, signalCanvas.width, signalCanvas.height);
            
            if (signal.length < 2) return;
            
            ctx.beginPath();
            ctx.strokeStyle = '#27ae60';
            ctx.lineWidth = 2;
            
            const maxVal = Math.max(...signal.map(Math.abs));
            const scaleY = signalCanvas.height / (2 * (maxVal || 1));
            const stepX = signalCanvas.width / (signal.length - 1);
            
            signal.forEach((value, index) => {
                const x = index * stepX;
                const y = signalCanvas.height / 2 - value * scaleY;
                
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
        }
        
        // 页面加载初始化
        window.addEventListener('DOMContentLoaded', function() {
            startBtn.addEventListener('click', startDetection);
            stopBtn.addEventListener('click', stopDetection);
            
            // 移动端触摸支持
            startBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                startDetection();
            });
            
            stopBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                stopDetection();
            });
        });
        
        // 清理资源
        window.addEventListener('beforeunload', function() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
        });
    </script>
</body>
</html>
