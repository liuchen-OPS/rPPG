<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简可靠的心率检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0d1123 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .camera-container {
            position: relative;
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            background: #f0f0f0;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .camera-placeholder {
            color: #999;
            font-size: 16px;
        }
        
        .fixed-box {
            position: absolute;
            border: 3px solid #e74c3c;
            border-radius: 15px;
            background: rgba(231, 76, 60, 0.1);
            pointer-events: none;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 220px;
        }
        
        .box-guide {
            position: absolute;
            color: #e74c3c;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            bottom: -25px;
            left: 0;
        }
        
        .status-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .heart-rate {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
        
        .status {
            font-size: 16px;
            color: #7f8c8d;
            margin: 5px 0;
        }
        
        .quality {
            font-size: 14px;
            color: #27ae60;
            margin: 5px 0;
        }
        
        .signal-graph {
            height: 60px;
            background: #f0f0f0;
            border-radius: 5px;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-start {
            background: #27ae60;
            color: white;
        }
        
        .btn-stop {
            background: #e74c3c;
            color: white;
        }
        
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        
        .instructions {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }
        
        .instructions h3 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .instructions ul {
            padding-left: 20px;
            color: #856404;
        }
        
        .instructions li {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #7f8c8d;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .warning {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .debug-info {
            background: #e8f4fd;
            border: 1px solid #b3d9ff;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            font-size: 12px;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .simple-info {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 5px;
            padding: 8px;
            margin: 5px 0;
            font-size: 12px;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>❤️ 极简可靠的心率检测</h1>
            <p>使用固定检测区域，无需面部识别</p>
        </div>
        
        <div class="camera-container">
            <video class="camera-feed" id="cameraFeed" autoplay playsinline></video>
            <div class="fixed-box" id="fixedBox">
                <div class="box-guide">请将面部置于此框内</div>
            </div>
            <div class="camera-placeholder" id="cameraPlaceholder">
                点击"开始检测"启用摄像头
            </div>
        </div>
        
        <div class="simple-info" id="simpleInfo">
            检测状态: 等待开始 | 使用固定检测区域
        </div>
        
        <div class="warning" id="warningMessage">
            ⚠️ 极简版 - 无需面部检测，直接使用固定区域检测心率
        </div>
        
        <div class="status-panel">
            <div class="status" id="statusText">状态: 等待开始检测</div>
            <div class="heart-rate" id="heartRate">--</div>
            <div class="quality" id="qualityText">信号质量: --%</div>
            <div class="status" id="stabilityText">检测帧数: 0</div>
            <div class="signal-graph">
                <canvas id="signalCanvas" width="300" height="60"></canvas>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-start" id="startBtn">🔴 开始检测</button>
            <button class="btn btn-stop" id="stopBtn" disabled>停止检测</button>
        </div>
        
        <div class="debug-info" id="debugInfo">
            调试信息将显示在这里...
        </div>
        
        <div class="instructions">
            <h3>📝 使用说明（极简版）</h3>
            <ul>
                <li><strong>无需面部检测</strong>: 直接使用固定红色框检测</li>
                <li><strong>简单可靠</strong>: 避免复杂的算法问题</li>
                <li><strong>手动定位</strong>: 将面部对准红色框中央</li>
                <li><strong>稳定检测</strong>: 固定区域确保信号稳定</li>
                <li><strong>快速启动</strong>: 立即开始心率检测</li>
            </ul>
        </div>
        
        <div class="footer">
            <p>极简可靠 | 固定区域检测 | 无需面部识别</p>
        </div>
    </div>

    <script>
        // 极简心率检测器 - 使用固定区域
        class UltraSimpleHeartRateDetector {
            constructor() {
                this.greenSignalBuffer = [];
                this.bufferSize = 180;
                this.samplingRate = 30;
                this.detectionCount = 0;
                this.fixedRegion = {
                    x: 0, // 将在视频就绪后计算
                    y: 0,
                    width: 180,
                    height: 220
                };
            }
            
            // 检查视频是否就绪
            isVideoReady(videoElement) {
                return videoElement.videoWidth > 0 && videoElement.videoHeight > 0;
            }
            
            // 获取固定检测区域
            getFixedRegion(videoElement) {
                if (!this.isVideoReady(videoElement)) return null;
                
                // 计算固定区域位置（画面中央）
                const centerX = videoElement.videoWidth / 2;
                const centerY = videoElement.videoHeight / 2;
                
                return {
                    x: centerX - this.fixedRegion.width / 2,
                    y: centerY - this.fixedRegion.height / 2,
                    width: this.fixedRegion.width,
                    height: this.fixedRegion.height
                };
            }
            
            // 提取绿色通道信号
            extractGreenSignal(videoElement, region) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                ctx.drawImage(videoElement, 
                    region.x, region.y, region.width, region.height,
                    0, 0, region.width, region.height);
                
                const imageData = ctx.getImageData(0, 0, region.width, region.height);
                const data = imageData.data;
                
                let totalGreen = 0;
                let pixelCount = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    totalGreen += data[i + 1];
                    pixelCount++;
                }
                
                return pixelCount > 0 ? totalGreen / pixelCount : 0;
            }
            
            // 极简信号处理
            preprocessSignal(signalData) {
                if (signalData.length < 10) return signalData;
                
                // 简单的去趋势
                const detrended = this.simpleDetrend(signalData);
                
                // 简单的滤波
                const filtered = this.simpleMovingAverage(detrended, 3);
                
                return filtered;
            }
            
            simpleDetrend(signal) {
                const mean = signal.reduce((a, b) => a + b, 0) / signal.length;
                return signal.map(val => val - mean);
            }
            
            simpleMovingAverage(signal, windowSize) {
                const result = [];
                for (let i = 0; i < signal.length; i++) {
                    const start = Math.max(0, i - windowSize);
                    const end = Math.min(signal.length, i + windowSize + 1);
                    const window = signal.slice(start, end);
                    result.push(window.reduce((a, b) => a + b, 0) / window.length);
                }
                return result;
            }
            
            // 简单心率计算
            calculateHeartRate(signal) {
                if (signal.length < 60) return { heartRate: 0, confidence: 0 };
                
                // 简单的峰值检测
                const peaks = this.detectPeaks(signal);
                
                if (peaks.length >= 2) {
                    // 计算平均心率
                    const intervals = [];
                    for (let i = 1; i < peaks.length; i++) {
                        intervals.push(peaks[i] - peaks[i - 1]);
                    }
                    
                    const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
                    const heartRate = (60 * this.samplingRate) / avgInterval;
                    
                    // 计算置信度
                    const intervalStd = Math.sqrt(
                        intervals.reduce((sum, val) => sum + Math.pow(val - avgInterval, 2), 0) / intervals.length
                    );
                    const confidence = Math.max(0, 100 - (intervalStd / avgInterval) * 100);
                    
                    if (heartRate >= 40 && heartRate <= 180 && confidence > 30) {
                        return { 
                            heartRate: Math.round(heartRate), 
                            confidence: Math.round(confidence) 
                        };
                    }
                }
                
                return { heartRate: 0, confidence: 0 };
            }
            
            // 简单峰值检测
            detectPeaks(signal) {
                const peaks = [];
                const threshold = 0.5 * Math.max(...signal.map(Math.abs));
                
                for (let i = 1; i < signal.length - 1; i++) {
                    if (signal[i] > signal[i - 1] && 
                        signal[i] > signal[i + 1] && 
                        signal[i] > threshold) {
                        peaks.push(i);
                    }
                }
                
                return peaks;
            }
            
            // 简单信号质量评估
            assessSignalQuality(signal) {
                if (signal.length < 30) return 0;
                
                // 计算标准差
                const mean = signal.reduce((a, b) => a + b, 0) / signal.length;
                const variance = signal.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / signal.length;
                const std = Math.sqrt(variance);
                
                // 简单质量评估
                return Math.min(100, std * 50);
            }
        }

        // 全局变量
        const detector = new UltraSimpleHeartRateDetector();
        let cameraStream = null;
        let detectionActive = false;
        let animationFrameId = null;
        let videoReady = false;
        
        // 获取DOM元素
        const cameraFeed = document.getElementById('cameraFeed');
        const cameraPlaceholder = document.getElementById('cameraPlaceholder');
        const fixedBox = document.getElementById('fixedBox');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const heartRate = document.getElementById('heartRate');
        const qualityText = document.getElementById('qualityText');
        const stabilityText = document.getElementById('stabilityText');
        const debugInfo = document.getElementById('debugInfo');
        const simpleInfo = document.getElementById('simpleInfo');
        const signalCanvas = document.getElementById('signalCanvas');
        const ctx = signalCanvas.getContext('2d');
        
        // 视频流就绪检查
        function checkVideoReady() {
            if (cameraFeed.videoWidth > 0 && cameraFeed.videoHeight > 0) {
                videoReady = true;
                
                // 更新固定框位置
                const region = detector.getFixedRegion(cameraFeed);
                if (region) {
                    fixedBox.style.left = `${region.x + region.width / 2}px`;
                    fixedBox.style.top = `${region.y + region.height / 2}px`;
                }
                
                debugInfo.textContent = '摄像头已就绪，开始检测...';
                return true;
            }
            return false;
        }
        
        // 启动检测
        async function startDetection() {
            try {
                debugInfo.textContent = '正在请求摄像头权限...';
                
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                cameraFeed.srcObject = cameraStream;
                cameraPlaceholder.style.display = 'none';
                cameraFeed.style.display = 'block';
                fixedBox.style.display = 'block';
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusText.textContent = '状态: 摄像头初始化中...';
                statusText.style.color = '#f39c12';
                
                // 等待视频流就绪
                const waitForVideoReady = () => {
                    if (checkVideoReady()) {
                        detectionActive = true;
                        detector.detectionCount = 0;
                        detector.greenSignalBuffer = [];
                        statusText.textContent = '状态: 检测中...';
                        statusText.style.color = '#27ae60';
                        simpleInfo.textContent = '检测状态: 运行中 | 固定区域检测';
                        processVideoFrame();
                    } else {
                        setTimeout(waitForVideoReady, 100);
                    }
                };
                
                waitForVideoReady();
                
            } catch (error) {
                debugInfo.textContent = `摄像头错误: ${error.message}`;
                statusText.textContent = '错误: 无法访问摄像头';
                statusText.style.color = '#e74c3c';
                startBtn.disabled = false;
            }
        }
        
        // 处理视频帧
        function processVideoFrame() {
            if (!detectionActive || !videoReady) return;
            
            try {
                const region = detector.getFixedRegion(cameraFeed);
                
                if (region) {
                    // 提取绿色通道信号
                    const greenValue = detector.extractGreenSignal(cameraFeed, region);
                    detector.greenSignalBuffer.push(greenValue);
                    
                    // 保持缓冲区大小
                    if (detector.greenSignalBuffer.length > detector.bufferSize) {
                        detector.greenSignalBuffer.shift();
                    }
                    
                    detector.detectionCount++;
                    
                    // 每30帧（约1秒）进行一次心率计算
                    if (detector.detectionCount % 30 === 0 && detector.greenSignalBuffer.length >= 60) {
                        const processedSignal = detector.preprocessSignal(detector.greenSignalBuffer);
                        const result = detector.calculateHeartRate(processedSignal);
                        const quality = detector.assessSignalQuality(processedSignal);
                        
                        updateDisplay(result.heartRate, quality, result.confidence);
                        drawSignalWave(processedSignal);
                        
                        debugInfo.textContent = 
                            `信号长度: ${detector.greenSignalBuffer.length} | 检测帧数: ${detector.detectionCount} | ` +
                            `质量: ${Math.round(quality)}% | 置信度: ${result.confidence}%`;
                    }
                    
                    stabilityText.textContent = `检测帧数: ${detector.detectionCount}`;
                }
            } catch (error) {
                console.error('视频帧处理错误:', error);
                debugInfo.textContent = `处理错误: ${error.message}`;
            }
            
            if (detectionActive) {
                animationFrameId = requestAnimationFrame(processVideoFrame);
            }
        }
        
        // 停止检测
        function stopDetection() {
            detectionActive = false;
            videoReady = false;
            
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            cameraFeed.style.display = 'none';
            fixedBox.style.display = 'none';
            cameraPlaceholder.style.display = 'block';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            statusText.textContent = '状态: 检测已停止';
            statusText.style.color = '#7f8c8d';
            heartRate.textContent = '--';
            heartRate.classList.remove('pulse');
            qualityText.textContent = '信号质量: --%';
            stabilityText.textContent = '检测帧数: 0';
            simpleInfo.textContent = '检测状态: 等待开始 | 使用固定检测区域';
            
            ctx.clearRect(0, 0, signalCanvas.width, signalCanvas.height);
        }
        
        // 更新显示
        function updateDisplay(hr, quality, confidence) {
            if (hr > 0) {
                heartRate.textContent = hr;
                qualityText.textContent = `信号质量: ${Math.round(quality)}% (置信度: ${confidence}%)`;
                
                heartRate.classList.add('pulse');
                setTimeout(() => heartRate.classList.remove('pulse'), 500);
                
                if (hr >= 60 && hr <= 100) {
                    heartRate.style.color = '#27ae60';
                    statusText.textContent = '状态: 心率正常';
                } else if (hr < 60) {
                    heartRate.style.color = '#3498db';
                    statusText.textContent = '状态: 心率偏低';
                } else {
                    heartRate.style.color = '#e74c3c';
                    statusText.textContent = '状态: 心率偏高';
                }
                
                if (quality > 70) {
                    qualityText.style.color = '#27ae60';
                } else if (quality > 40) {
                    qualityText.style.color = '#f39c12';
                } else {
                    qualityText.style.color = '#e74c3c';
                }
            }
        }
        
        // 绘制信号波形
        function drawSignalWave(signal) {
            ctx.clearRect(0, 0, signalCanvas.width, signalCanvas.height);
            
            if (signal.length < 2) return;
            
            ctx.beginPath();
            ctx.strokeStyle = '#27ae60';
            ctx.lineWidth = 2;
            
            const maxVal = Math.max(...signal.map(Math.abs));
            const scaleY = signalCanvas.height / (2 * (maxVal || 1));
            const stepX = signalCanvas.width / (signal.length - 1);
            
            signal.forEach((value, index) => {
                const x = index * stepX;
                const y = signalCanvas.height / 2 - value * scaleY;
                
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
        }
        
        // 页面加载初始化
        window.addEventListener('DOMContentLoaded', function() {
            startBtn.addEventListener('click', startDetection);
            stopBtn.addEventListener('click', stopDetection);
            
            // 移动端触摸支持
            startBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                startDetection();
            });
            
            stopBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                stopDetection();
            });
        });
        
        // 清理资源
        window.addEventListener('beforeunload', function() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
        });
    </script>
</body>
</html>
