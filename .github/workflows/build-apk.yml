name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        packages: 'platform-tools platforms;android-28 build-tools;28.0.3 ndk;25.2.9519653'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          python3-pip git zip unzip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libffi-dev libssl-dev automake cmake libltdl-dev
        
        pip install --upgrade pip
        pip install buildozer cython kivy
    
    - name: Prepare main.py
      run: cp main_webview.py main.py
    
    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653
        export ANDROIDAPI=28
        export ANDROIDMINAPI=21
        export BUILDOZER_NO_UPDATE=1
        buildozer android debug
      timeout-minutes: 90
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rPPG-APK
        path: bin/*.apk
        retention-days: 7
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
