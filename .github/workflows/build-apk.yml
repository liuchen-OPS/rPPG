name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
      options: --user root
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Prepare main.py
      run: cp main_webview.py main.py
    
    - name: Build APK
      run: |
        # Accept Android SDK licenses automatically
        yes | /root/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        buildozer android debug
      timeout-minutes: 90
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: Find and copy APK
      run: |
        echo "=== Looking for APK files ==="
        find / -name "*.apk" -type f 2>/dev/null | head -20
        mkdir -p bin
        find / -name "*.apk" -type f -exec cp {} bin/ \; 2>/dev/null || true
        echo "=== Contents of bin directory ==="
        ls -la bin/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rPPG-APK
        path: bin/*.apk
        retention-days: 7
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
