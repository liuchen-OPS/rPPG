name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          python3-pip git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libffi-dev libssl-dev automake cmake libltdl-dev
        
        pip install --upgrade pip
        pip install buildozer cython kivy
    
    - name: Prepare main.py
      run: cp main_webview.py main.py
    
    - name: Build APK
      run: |
        yes | buildozer android debug 2>&1 | tee buildozer.log || true
        echo "=== Buildozer exit code: $? ==="
        echo "=== Last 100 lines of log ==="
        tail -100 buildozer.log
      timeout-minutes: 90
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: Find and copy APK
      run: |
        echo "Looking for APK files..."
        # Search in current directory and buildozer directories
        find . -name "*.apk" -type f 2>/dev/null
        find ~/.buildozer -name "*.apk" -type f 2>/dev/null
        # Create bin directory if not exists
        mkdir -p bin
        # Copy any found APK to bin directory
        find . -name "*.apk" -type f -exec cp {} bin/ \; 2>/dev/null || true
        find ~/.buildozer -name "*.apk" -type f -exec cp {} bin/ \; 2>/dev/null || true
        echo "Contents of bin directory:"
        ls -la bin/
        echo "Contents of .buildozer directory:"
        ls -la .buildozer/ 2>/dev/null || true
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rPPG-APK
        path: bin/*.apk
        retention-days: 7
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
